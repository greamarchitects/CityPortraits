site_name: CityPortraits
site_description: A project showcasing the architectural heritage of cities through portraits
site_url: https://github.com/greamarchitects/CityPortraits

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes

nav:
  - Home: index.md
  - Print All: print_all.md

  - Methodology:
      - methodology/index.md
      - Contextual Analysis:
          - methodology/contextual_analysis/index.md
      - Spatial Analysis:
          - methodology/spatial_analysis/index.md
      - Data Analysis:
          - methodology/data_analysis/index.md

  - Model:
      - model/index.md

  - Case Studies:
      - case_studies/index.md

  - About: 
      - about/index.md

extra_css:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - javascripts/timeline-map.js
  - javascripts/graph.js
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js
  - https://unpkg.com/cytoscape/dist/cytoscape.min.js


markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


plugins:
  - search
#   - pdf-export:
#       combined: true

markdown_extensions:
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true

      
dev_addr: 127.0.0.1:8002
site_url: http://127.0.0.1:8002/greamarchitects/CityPortraits/