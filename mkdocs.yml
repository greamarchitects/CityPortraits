site_name: CityPortraits
site_description: A project showcasing the architectural heritage of cities through portraits
site_url: https://github.com/greamarchitects/CityPortraits

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes

nav:
  - Home: index.md

  - Methodology:
      - methodology/index.md
      - Contextual Analysis:
          - methodology/contextual_analysis/index.md
      - Spatial Analysis:
          - methodology/spatial_analysis/index.md
      - Data Analysis:
          - methodology/data_analysis/index.md

  - Model:
      - model/index.md

  - Case Studies:
      - case_studies/index.md

  - About: 
      - about/index.md

extra_css:
  - https://unpkg.com/maplibre-gl/dist/maplibre-gl.css
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/maplibre-gl/dist/maplibre-gl.js
  - javascripts/timeline-map.js